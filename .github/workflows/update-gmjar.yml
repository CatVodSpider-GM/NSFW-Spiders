name: Update GM.jar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download latest GM.jar
        uses: robinraju/release-downloader@v1
        with:
          repository: CatVodSpider-GM/CatVodSpider-WebMonkey
          fileName: GM.jar
          latest: true
          out-file-path: Spiders-Lib
          token: ${{ secrets.GH_PAT }}

      - name: Update MD5 in index.json
        run: |
          MD5=$(md5sum Spiders-Lib/GM.jar | awk '{print $1}')
          echo "New MD5: $MD5"
          sed -i "s/md5;[a-f0-9]\{32\}/md5;$MD5/g" index.json
          cat index.json | grep -o "md5;[a-f0-9]*"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Spiders-Lib/GM.jar index.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update GM.jar ($(date +%Y-%m-%d))"
            git push
          fi
